            type: object
          status:
            description: GlobalDeploymentStatus defines the observed state of GlobalDeployment.
            properties:
              failed:
                description: Failed is the number of replicas in Failed phase.
                format: int32
                type: integer
              observedRevision:
                description: |-
                  ObservedRevision is the global rolling revision maintained by GlobalDeployment controller.
                  It is used to differentiate old/new replicas during rolling migration.
                type: string
              pending:
                description: Pending is the number of replicas still pending.
                format: int32
                type: integer
              phase:
                description: Phase is the aggregated phase computed from ReplicaBindings.
                enum:
                - Pending
                - Progressing
                - Running
                - Degraded
                - Scaling
                - Deleting
                - Failed
                type: string
              running:
                description: Running is the number of replicas in Running phase.
