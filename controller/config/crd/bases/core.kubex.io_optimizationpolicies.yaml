---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: optimizationpolicies.core.kubex.io
spec:
  group: core.kubex.io
  names:
    kind: OptimizationPolicy
    listKind: OptimizationPolicyList
    plural: optimizationpolicies
    shortNames:
    - op
    singular: optimizationpolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: OptimizationPolicy is the Schema for the optimizationpolicies
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OptimizationPolicySpec defines the desired state of OptimizationPolicy.
            properties:
              enabled:
                default: false
                description: Enabled indicates whether this policy is active. Only
                  one policy may be active at a time (enforced by Lease in controller).
                type: boolean
              improvementThresholdPercent:
                description: ImprovementThresholdPercent is used when Strategy=Conservative.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              optimizationGoals:
                description: OptimizationGoals is a list of weighted objectives.
                items:
                  description: |-
                    OptimizationGoal defines one weighted optimization objective.
                    This largely follows `design_doc/optimization.md`.
                  properties:
                    sourceCity:
                      description: SourceCity is used by Latency goal.
                      type: string
                    topologyRef:
                      description: TopologyRef references a ConfigMap name (typically
                        in kubex-system) for Communication goal.
                      type: string
                    type:
                      description: Type is the plugin name, e.g. Cost/Latency/Communication/Energy/Migration.
                      minLength: 1
                      type: string
                    weight:
                      description: |-
                        Weight is in [0,1]. A weight of 0 means disabled.
                        (sum-to-1 validation is controller responsibility in M1)
                      maximum: 1
                      minimum: 0
                      type: number
                  type: object
                type: array
              rebalancePoint:
                description: RebalancePoint is required when RunMode is Periodic,
                  e.g. "24h".
                type: string
              runMode:
                default: Once
                description: RunMode determines whether optimizer runs once or periodically.
                enum:
                - Once
                - Periodic
                type: string
              strategy:
                default: Preview
                description: 'Strategy defines execution mode: Preview/Conservative/Aggressive.'
                enum:
                - Preview
                - Conservative
                - Aggressive
                type: string
              targetSelector:
                description: |-
                  TargetSelector selects GlobalDeployments this policy applies to.
                  Empty selector means all.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            type: object
          status:
            description: OptimizationPolicyStatus defines the observed state of OptimizationPolicy.
            properties:
              conditions:
                description: Conditions provide detailed diagnostics.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentLayout:
                description: |-
                  CurrentLayout is the collected current placement (x_ij_current) for later modeling.
                  It is a best-effort list; items with empty clusterId/nodeName indicate unknown placement.
                items:
                  description: |-
                    CurrentReplicaLocation is the ground-truth (or best-effort) current placement for a replica.
                    It is used to construct x_ij_current in later optimization modeling.
                  properties:
                    clusterId:
                      description: ClusterId is the member cluster identifier.
                      type: string
                    name:
                      description: GlobalDeploymentRef identifies the GlobalDeployment
                        this replica belongs to.
                      minLength: 1
                      type: string
                    namespace:
                      minLength: 1
                      type: string
                    nodeName:
                      description: NodeName is the Kubernetes node name inside the
                        member cluster.
                      type: string
                    replicaIndex:
                      description: ReplicaIndex is 0..replicas-1.
                      format: int32
                      minimum: 0
                      type: integer
                    source:
                      description: 'Source indicates where the location comes from:
                        RBStatus or RBSpecFallback.'
                      type: string
                    stable:
                      description: Stable indicates whether this replica is considered
                        stable and eligible for optimization.
                      type: boolean
                    unstableReason:
                      description: UnstableReason is set when stable=false.
                      type: string
                  type: object
                type: array
              lastEvaluationTime:
                description: LastEvaluationTime records last optimizer run time.
                format: date-time
                type: string
              latestPlanRef:
                description: LatestPlanRef points to the most recent plan created.
                properties:
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    minLength: 1
                    type: string
                type: object
              observedDeployments:
                description: ObservedDeployments is number of GlobalDeployments matched
                  by targetSelector.
                format: int32
                type: integer
              observedReplicas:
                description: ObservedReplicas is number of ReplicaBindings (replicas)
                  discovered under selected GlobalDeployments.
                format: int32
                type: integer
              phase:
                description: Phase is the main lifecycle status.
                enum:
                - Pending
                - Active
                - Failed
                - Disabled
                type: string
              stableReplicas:
                description: StableReplicas is number of replicas considered stable.
                format: int32
                type: integer
              unstableReasonsCount:
                additionalProperties:
                  format: int32
                  type: integer
                description: |-
                  UnstableReasonsCount aggregates exclusion reasons to help debugging.
                  key is reason string, value is count.
                type: object
              unstableReplicas:
                description: UnstableReplicas is number of replicas excluded from
                  optimization.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
