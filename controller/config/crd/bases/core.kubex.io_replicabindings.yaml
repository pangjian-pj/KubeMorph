                    type: string
                  lastResult:
                    description: LastResult is the terminal result for LastHandledRequest.
                    enum:
                    - Succeeded
                    - Failed
                    type: string
                  message:
                    description: Message is a human-readable message for the last
                      handled request.
                    type: string
                  observedLocation:
                    description: ObservedLocation is the ground-truth location after
                      handling the request.
                    properties:
                      clusterId:
                        description: ClusterId is the member cluster identifier.
                        type: string
                      nodeName:
                        description: NodeName is the node name inside the member cluster.
                        type: string
                      podName:
                        description: PodName is a representative member pod name for
