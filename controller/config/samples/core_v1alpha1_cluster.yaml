apiVersion: core.kubex.io/v1alpha1
kind: Cluster
metadata:
  labels:
    app.kubernetes.io/name: kubex-controller
    app.kubernetes.io/managed-by: kustomize
  name: cluster-sample
spec:
  apiEndpoint: "https://10.0.0.1:6443"
  secretRef: "cluster-sample-kubeconfig"

