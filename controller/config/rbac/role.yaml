---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.kubex.io
  resources:
  - clusters
  - globaldeployments
  - replicabindings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.kubex.io
  resources:
  - clusters/finalizers
  verbs:
  - update
- apiGroups:
  - core.kubex.io
  resources:
  - clusters/status
  - globaldeployments/status
  - replicabindings/status
  verbs:
  - get
  - patch
  - update
